<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Visualization - Benchmark Data Management</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="container" id="mainContainer">
        <header>
            <h1>Benchmark Data Management System</h1>
            <nav class="nav-menu">
                <a href="../index.html">Home</a>
                <a href="data-op.html">Data Operations</a>
                <a href="chart.html" class="active">Data Visualization</a>
                <a href="data.html">Data Management</a>
            </nav>
        </header>

        <div class="sub-tab-bar sub-tab-bar-animate" id="subTabBar">
            <button class="sub-tab active" data-panel="trends" onclick="switchPanel('trends')">Performance Trends</button>
            <button class="sub-tab" data-panel="compare" onclick="switchPanel('compare')">Compare Operators</button>
        </div>

        <main class="chart-main">
            <section class="chart-section">
                <div class="panel chart-panel" id="trendPanel" data-panel-id="trends" style="display: none;">
                    <h2>Performance Trends</h2>

                    <div class="form-group">
                        <label for="chartBenchmarkSelect">Select Benchmark:</label>
                        <select id="chartBenchmarkSelect">
                            <option value="">-- Select Benchmark --</option>
                        </select>
                    </div>

                    <div class="form-group" id="selectionPanel" style="display: none;">
                        <div class="selection-header">
                            <h3>Select Arch and Configuration:</h3>
                            <div class="selection-actions">
                                <button type="button" id="selectAllBtn" class="action-btn">Select All</button>
                                <button type="button" id="deselectAllBtn" class="action-btn">Deselect All</button>
                            </div>
                        </div>
                        <div id="vendorConfigurationCheckboxes"></div>
                    </div>

                    <div class="form-group">
                        <label for="yAxisSelect">Y-Axis Metric:</label>
                        <select id="yAxisSelect">
                            <option value="duration">Duration (ms)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <button type="button" id="drawChartBtn" disabled>Draw Chart</button>
                    </div>
                </div>

                <div class="panel chart-panel" id="comparePanel" data-panel-id="compare" style="display: none;">
                    <h2>Compare Operators</h2>

                    <div class="form-group">
                        <label for="opBenchmarkSelect">Select Benchmark:</label>
                        <select id="opBenchmarkSelect">
                            <option value="">-- Select Benchmark --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="opVendorSelect">Select Arch:</label>
                        <select id="opVendorSelect" disabled>
                            <option value="">-- Select Arch --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="opConfigSelect">Select Configuration:</label>
                        <select id="opConfigSelect" disabled>
                            <option value="">-- Select Configuration --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Chart Mode:</label>
                        <div class="op-mode-toggle">
                            <button type="button" class="op-mode-btn active" id="opModeSingle" onclick="setOpMode('single')">Single Date</button>
                            <button type="button" class="op-mode-btn" id="opModeCompare" onclick="setOpMode('compare')">Compare Dates</button>
                        </div>
                    </div>

                    <div class="op-date-row">
                        <div class="form-group op-date-group">
                            <label for="opDateLeft" id="opDateLeftLabel">Date:</label>
                            <select id="opDateLeft" disabled>
                                <option value="">-- Select Date --</option>
                            </select>
                        </div>
                        <div class="form-group op-date-group" id="opDateRightGroup">
                            <label for="opDateRight">Date (Right):</label>
                            <select id="opDateRight" disabled>
                                <option value="">-- Select Date --</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <button type="button" id="opDrawBtn" class="op-draw-btn" disabled>Draw Chart</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div class="chart-fullscreen" id="chartFullscreen">
        <div class="chart-container-fullscreen" id="chartContainer">
            <canvas id="chartCanvas"></canvas>
        </div>
        <div class="chart-hint" id="chartHint">Click anywhere to return</div>
    </div>

    <script src="../js/db.js"></script>
    <script src="../js/chart.js"></script>
</body>
</html>
