<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Operations - Benchmark Data Management</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Benchmark Data Management System</h1>
            <nav class="nav-menu">
                <a href="../index.html">Home</a>
                <a href="data-op.html" class="active">Data Operations</a>
                <a href="chart.html">Data Visualization</a>
                <a href="data.html">Data Management</a>
            </nav>
        </header>

        <main class="data-main">
            <div class="data-top-row" id="dataTopRow">
                <div class="panel data-operation-panel" id="dataOperationPanel">
                    <h2>Data Operations</h2>

                    <div class="hierarchy-level level-1">
                        <div class="level-header">
                            <span class="level-badge">Level 1</span>
                            <span class="level-title">Benchmark</span>
                        </div>
                        <div class="level-content">
                            <div class="form-group searchable-select">
                                <input type="text" id="benchmarkSearch" class="select-search-input" placeholder="Search..." oninput="filterSelect('benchmarkSelect', 'benchmarkSearch')">
                                <select id="benchmarkSelect">
                                    <option value="">-- Select Benchmark --</option>
                                </select>
                            </div>
                            <div class="form-group inline-input">
                                <input type="text" id="newBenchmark" placeholder="New Benchmark Name">
                                <button type="button" id="addBenchmarkBtn">Add</button>
                                <button type="button" id="deleteBenchmarkBtn" class="delete-btn" disabled>Delete</button>
                            </div>
                        </div>
                    </div>

                    <div class="hierarchy-level level-2">
                        <div class="level-header">
                            <span class="level-badge">Level 2</span>
                            <span class="level-title">Arch</span>
                        </div>
                        <div class="level-content">
                            <div class="form-group searchable-select">
                                <input type="text" id="vendorSearch" class="select-search-input" placeholder="Search..." oninput="filterSelect('vendorSelect', 'vendorSearch')" disabled>
                                <select id="vendorSelect" disabled>
                                    <option value="">-- Select Arch --</option>
                                </select>
                            </div>
                            <div class="form-group inline-input">
                                <input type="text" id="newVendor" placeholder="New Arch Name" disabled>
                                <button type="button" id="addVendorBtn" disabled>Add</button>
                                <button type="button" id="deleteVendorBtn" class="delete-btn" disabled>Delete</button>
                            </div>
                        </div>
                    </div>

                    <div class="hierarchy-level level-3">
                        <div class="level-header">
                            <span class="level-badge">Level 3</span>
                            <span class="level-title">Configuration</span>
                        </div>
                        <div class="level-content">
                            <div class="form-group searchable-select">
                                <input type="text" id="configurationSearch" class="select-search-input" placeholder="Search..." oninput="filterSelect('configurationSelect', 'configurationSearch')" disabled>
                                <select id="configurationSelect" disabled>
                                    <option value="">-- Select Configuration --</option>
                                </select>
                            </div>
                            <div class="form-group inline-input">
                                <input type="text" id="newConfiguration" placeholder="e.g., fp32, int8, shape224" disabled>
                                <button type="button" id="addConfigurationBtn" disabled>Add</button>
                                <button type="button" id="deleteConfigurationBtn" class="delete-btn" disabled>Delete</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="panel record-detail-panel" id="recordDetailPanel" style="display: none;">
                    <h2>Record Details</h2>

                    <div class="record-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="recordDate">Date:</label>
                                <input type="date" id="recordDate">
                            </div>
                            <div class="form-group">
                                <label for="recordDuration">Duration (ms):</label>
                                <input type="number" id="recordDuration" step="0.001" placeholder="e.g., 123.456">
                            </div>
                        </div>

                        <div class="record-extra-toggle" onclick="toggleRecordExtra()">
                            <span id="toggleIcon">&#9660;</span>
                            <span>Show More Fields</span>
                        </div>

                        <div class="record-extra-fields" id="recordExtraFields" style="display: none;">
                            <div id="extraFieldsList"></div>
                            <button type="button" id="addFieldBtn" class="add-field-btn" disabled>+ Add Field</button>
                        </div>
                    </div>

                    <div class="form-group btn-group" id="btnGroup">
                        <button type="button" id="saveRecordBtn" disabled>Save Record</button>
                        <button type="button" id="clearFormBtn">Clear Form</button>
                    </div>
                </div>
            </div>

            <div class="panel records-list-panel" id="recordsListPanel" style="display: none;">
                <h2>Existing Records</h2>
                <div id="recordsSubtitle" class="records-subtitle"></div>
                <div class="records-toolbar">
                    <input type="text" id="dateSearchInput" class="date-search-input" placeholder="Search by date (e.g., 2026-04)" oninput="filterRecordsByDate()">
                </div>
                <div id="recordsList"></div>
            </div>
        </main>
    </div>

    <script src="../js/data-op.js"></script>
</body>
</html>
